services:
  postgres:
    image: postgres:16
    container_name: hostaway-postgres
    environment:
      POSTGRES_DB: hostaway_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: hostaway-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  web:
    build: .
    container_name: hostaway-web
    depends_on:
      - postgres
      - redis
    ports:
      - "3000:3000"
    env_file:
      - .env

  worker:
    build: .
    container_name: hostaway-worker
    command: npm run worker
    depends_on:
      - postgres
      - redis
    env_file:
      - .env

volumes:
  postgres_data:
  redis_data:
